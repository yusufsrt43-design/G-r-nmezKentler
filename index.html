<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görünmez Kentler - Po.E.T.A</title>
    <link rel="icon" type="image/png" href="POETA_Logo.png">
    <link rel="apple-touch-icon" href="POETA_Logo.png">
    <style>
        :root { --bg: #8b8b83; --cyan: #fffff0; }
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; height: 100vh; margin: 0; overflow: hidden;
        }

        /* MOBİL DÜZEN (2x2 Yapı) */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .cards-area { order: 1; width: 100%; height: 65vh !important; padding: 10px; }
            .text-area-container { order: 2; width: 100%; height: auto !important; border: none; padding: 15px; }
            
            .grid-4 { 
                grid-template-columns: 1fr 1fr !important; /* Mobilde 2 Sütun */
                grid-template-rows: 1fr 1fr !important;    /* Mobilde 2 Satır */
                gap: 10px !important;
            }
            .grid-1 .card { height: 90% !important; max-width: none !important; }
        }

        /* ANA ALANLAR */
        .cards-area { flex: 3; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; padding: 20px; }
        .text-area-container { flex: 1; display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; height: 100vh; }
        
        /* CAROUSEL (SAYFALAMA) YAPISI */
        .carousel { position: relative; width: 100%; max-width: 1400px; height: 85%; display: flex; align-items: center; overflow: hidden; }
        .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .page { min-width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; padding: 10px; }
        
        /* IZGARALAR */
        /* 1. Sayfa (Kural Kartı) - Orantılı ve şık boyut */
        .grid-1 { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .grid-1 .card { height: 80%; width: auto; max-height: 600px; aspect-ratio: 827 / 1417; }
        
        /* Diğer Sayfalar (Oyun Kartları) - PC'de 4 Yan Yana (4x1) */
        .grid-4 { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* PC'de 4 Sütun */
            gap: 20px; 
            width: 100%; 
            height: 100%; 
            align-items: center; 
            justify-items: center;
        }

        .grid-4 .card {
            width: 100%;
            max-width: 280px; /* PC'de kartların devasa olmasını engeller */
        }

        /* CAROUSEL KONTROLLERİ */
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: 2px solid white; border-radius: 50%; width: 45px; height: 45px; font-size: 1.4rem; cursor: pointer; z-index: 10; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .nav-btn:hover { background: var(--cyan); color: black; }
        .prev { left: 10px; }
        .next { right: 10px; }
        
        .dots { display: flex; gap: 8px; margin-top: 15px; }
        .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.3); border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--cyan); transform: scale(1.3); }

        /* BUTONLAR & TEXTAREA */
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .action-btn {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; font-size: 0.85rem; flex: 1; transition: 0.3s;
        }
        .action-btn:hover:not(:disabled) { background: var(--cyan); color: var(--bg); box-shadow: 0 0 10px var(--cyan); }
        
        textarea { 
            width: 100%; flex: 1; min-height: 150px; 
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--cyan); padding: 12px; border-radius: 8px; resize: none; outline: none; 
            overflow-y: auto; transition: 0.3s;
        }

        /* KARTLAR */
        .card { 
            aspect-ratio: 827 / 1417; 
            cursor: pointer; 
            perspective: 1000px; 
            opacity: 0; 
            transform: translateY(10px); 
            transition: 0.4s; 
            margin: auto;
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; overflow: hidden; }
        .back { border: 2.5px solid; } 
        .front { transform: rotateY(180deg); background: white; }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* RENK BORDERLARI */
        .kural-ozel { border-color: #ffffff; }
        .sari { border-color: #e3f498; }
        .mavi { border-color: #92e8f7; }
        .kirmizi { border-color: #ff929d; }
        .yesil { border-color: #a7eaa3; }
        .magenta { border-color: #f3c5f6; }
        .siyah { border-color: #000000; }
    </style>
</head>
<body>

<div class="cards-area">
    <div class="carousel">
        <button class="nav-btn prev" onclick="moveSlide(-1)">&#10094;</button>
        <div class="carousel-track" id="carouselTrack"></div>
        <button class="nav-btn next" onclick="moveSlide(1)">&#10095;</button>
    </div>
    <div class="dots" id="dotsContainer"></div>
</div>

<div class="text-area-container">
    <div class="btn-group">
        <button id="allOpenBtn" class="action-btn">Başlat</button>
        <button id="downloadBtn" class="action-btn">İndir</button>
    </div>
    <textarea id="autoTextarea" placeholder="Hikayenizi buraya yazın..."></textarea>
</div>

<script>
    // AYARLAR (WebP Formatına Göre Ayarlandı)
    const ZAMANLAYICI_AKTIF = true; 
    const TOPLAM_SANIYE = 1200;      
    const ACILIS_GECIKMESI = 30;    

    const KURAL_AYAR = { dagitilacak: 1, havuz: 24 };
    const OYUN_AYARLARI = {
        'sari':    { dagitilacak: 7, havuz: 40 },
        'mavi':    { dagitilacak: 3, havuz: 15 },
        'kirmizi': { dagitilacak: 3, havuz: 15 },
        'yesil':   { dagitilacak: 1, havuz: 5 },
        'magenta': { dagitilacak: 1, havuz: 5 },
        'siyah':   { dagitilacak: 5, havuz: 20 }
    };
    
    let tumKartlarEls = [];
    let isAllOpen = false;
    let timerInterval;

    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    function randomNumbers(max, count) {
        let n = [];
        while(n.length < count) {
            let r = Math.floor(Math.random() * max) + 1;
            if(!n.includes(r)) n.push(r);
        }
        return n;
    }

    // KART ELEMENTİNİ OLUŞTURAN FONKSİYON
    function createCardElement(card, delayIndex) {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="card-inner">
            <div class="face back ${card.color}"><img src="${card.back}" loading="lazy"></div>
            <div class="face front"><img src="${card.front}" loading="lazy"></div>
        </div>`;
        div.onclick = () => div.classList.toggle('flipped');
        setTimeout(() => div.classList.add('visible'), delayIndex * 12);
        return div;
    }

    // 1. Kural Kartı
    let kuralKartlari = randomNumbers(KURAL_AYAR.havuz, KURAL_AYAR.dagitilacak).map((no, i) => {
        return createCardElement({ color: 'kural-ozel', front: `kural_on_${no}.webp`, back: `kural_arka.webp` }, i);
    });
    tumKartlarEls.push(...kuralKartlari);

    // 2. Oyun Kartları
    let oyunData = [];
    for (const [renk, ayar] of Object.entries(OYUN_AYARLARI)) {
        randomNumbers(ayar.havuz, ayar.dagitilacak).forEach(no => {
            oyunData.push({ color: renk, front: `${renk}_on_${no}.webp`, back: `${renk}_arka.webp` });
        });
    }
    oyunData.sort(() => Math.random() - 0.5); // Oyun kartlarını karıştır
    let oyunKartlari = oyunData.map((c, i) => createCardElement(c, i + KURAL_AYAR.dagitilacak));
    tumKartlarEls.push(...oyunKartlari);

    // --- SAYFALAMA (CAROUSEL) SİSTEMİ OLUŞTURMA ---
    const track = document.getElementById('carouselTrack');
    const dotsContainer = document.getElementById('dotsContainer');
    let totalPages = 0;

    // Sayfa 1: Sadece Kural Kartı
    if (kuralKartlari.length > 0) {
        let pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        let gridDiv = document.createElement('div');
        gridDiv.className = 'grid-1';
        kuralKartlari.forEach(k => gridDiv.appendChild(k));
        pageDiv.appendChild(gridDiv);
        track.appendChild(pageDiv);
        totalPages++;
    }

    // Diğer Sayfalar: 4'erli Oyun Kartları
    for (let i = 0; i < oyunKartlari.length; i += 4) {
        let pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        let gridDiv = document.createElement('div');
        gridDiv.className = 'grid-4';
        
        for (let j = 0; j < 4 && (i + j) < oyunKartlari.length; j++) {
            gridDiv.appendChild(oyunKartlari[i + j]);
        }
        
        pageDiv.appendChild(gridDiv);
        track.appendChild(pageDiv);
        totalPages++;
    }

    // Noktaları (Dots) Oluşturma
    for (let i = 0; i < totalPages; i++) {
        let dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goToSlide(i);
        dotsContainer.appendChild(dot);
    }

    // SLIDER KONTROL MANTIĞI
    let currentSlide = 0;
    function moveSlide(dir) {
        let newSlide = currentSlide + dir;
        if (newSlide >= totalPages) newSlide = 0;
        if (newSlide < 0) newSlide = totalPages - 1;
        goToSlide(newSlide);
    }

    function goToSlide(index) {
        currentSlide = index;
        track.style.transform = `translateX(-${currentSlide * 100}%)`;
        document.querySelectorAll('.dot').forEach((d, i) => {
            d.classList.toggle('active', i === currentSlide);
        });
    }

    // --- BAŞLAT BUTONU MANTIĞI ---
    const btn = document.getElementById('allOpenBtn');
    btn.onclick = () => {
        if (!isAllOpen) {
            isAllOpen = true; btn.disabled = true; btn.innerText = "Açılıyor...";
            let count = 0;
            tumKartlarEls.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('flipped');
                    count++;
                    if(count === tumKartlarEls.length) {
                        if (ZAMANLAYICI_AKTIF) {
                            let timeLeft = TOPLAM_SANIYE;
                            timerInterval = setInterval(() => {
                                btn.innerText = `Kalan: ${formatTime(timeLeft)}`;
                                timeLeft--;
                                if(timeLeft < 0) { clearInterval(timerInterval); kapatmaIslemi(); }
                            }, 1000);
                        } else { btn.disabled = false; btn.innerText = "Hepsini Kapat"; }
                    }
                }, index * ACILIS_GECIKMESI);
            });
        } else { kapatmaIslemi(); }
    };

    function kapatmaIslemi() {
        if(timerInterval) clearInterval(timerInterval);
        tumKartlarEls.forEach(c => c.classList.remove('flipped'));
        btn.disabled = false; btn.innerText = "Baştan Başlat"; isAllOpen = false;
    }

    // --- İNDİR BUTONU MANTIĞI (.txt kaydetme) ---
    document.getElementById('downloadBtn').onclick = () => {
        const textContent = document.getElementById('autoTextarea').value;
        if(textContent.trim() === "") {
            alert("İndirilecek bir hikaye bulunamadı. Lütfen önce bir şeyler yazın.");
            return;
        }
        
        // Tarayıcı belleğinde geçici bir txt dosyası (Blob) oluştur
        const blob = new window.Blob([textContent], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        // Arka planda bir <a> etiketi oluşturup tıklatarak indirmeyi tetikle
        const a = document.createElement('a');
        a.href = url;
        a.download = 'GorunmezKentler_Hikaye.txt';
        document.body.appendChild(a);
        a.click();
        
        // İndirme bittikten sonra temizlik yap
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };
</script>
</body>
</html>
