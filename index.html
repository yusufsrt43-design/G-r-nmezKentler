<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görünmez Kentler v2</title>
    <style>
        /* GÖRSEL TASARIM */
        :root { --bg: #0d2323; --box-bg: #e5fcfb; --accent: #7cffae; }
        * { box-sizing: border-box; }
        body { background: var(--bg); font-family: Arial, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }

        .main-wrapper { display: flex; flex-direction: row; gap: 20px; width: 100%; max-width: 1400px; height: 95vh; }

        /* SOL TARAF: KARTLAR (Kaydırılabilir alan) */
        .left-section { flex: 1.5; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; align-items: center; }
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }

        /* KART STİLLERİ */
        .card { width: 100%; aspect-ratio: 827 / 1100; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 5px; border: 3px solid #000; overflow: hidden; background: white; }
        .front { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* RENK BORDERLARI[cite: 2] */
        .kural-border { border-color: #ffffff !important; }
        .sari-border { border-color: #e3f498 !important; }
        .mavi-border { border-color: #92e8f7 !important; }
        .kirmizi-border { border-color: #ff929d !important; }
        .yesil-border { border-color: #a7eaa3 !important; }
        .magenta-border { border-color: #f3c5f6 !important; }
        .siyah-border { border-color: #000000 !important; }

        /* SAĞ TARAF: YAZI ALANI[cite: 1] */
        .right-section { flex: 1; background: var(--box-bg); border: 4px solid #000; display: flex; flex-direction: column; border-radius: 8px; }
        .top-bar { display: flex; border-bottom: 4px solid #000; }
        .top-bar button { flex: 1; padding: 20px; font-size: 22px; font-weight: bold; border: none; background: white; cursor: pointer; transition: 0.2s; }
        #downloadBtn { border-left: 4px solid #000; }
        .top-bar button:hover:not(:disabled) { background: var(--accent); }
        textarea { flex: 1; padding: 15px; font-size: 16px; border: none; outline: none; resize: none; background: transparent; }

        /* MOBİL UYUM */
        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; height: auto; }
            .card-grid { grid-template-columns: repeat(3, 1fr); }
            .right-section { height: 400px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Kart Alanı -->
    <div class="left-section">
        <div class="card-grid" id="cardGrid"></div>
    </div>

    <!-- Yazı Alanı -->
    <div class="right-section">
        <div class="top-bar">
            <button id="startBtn">Başlat</button>
            <button id="downloadBtn">İndir</button>
        </div>
        <textarea id="storyText" placeholder="Hikayenizi buraya yazın..."></textarea>
    </div>
</div>

<script>
    /* =========================================
       DEĞİŞTİREBİLECEĞİN AYARLAR ALANI[cite: 2]
       ========================================= */
    
    const ZAMAN_SANIYE = 1200;      // Geri sayım süresi (20 dakika)
    const ACILIS_HIZI = 50;        // Kartların tek tek açılma hızı (milisaniye)

    // Hangi renkten kaç tane dağıtılacak? (Toplam 20 oyun kartı olmalı)
    const DAGITIM_AYARLARI = {
        'sari':    { adet: 7, havuz: 40 },
        'mavi':    { adet: 3, havuz: 15 },
        'kirmizi': { adet: 3, havuz: 15 },
        'yesil':   { adet: 1, havuz: 5 },
        'magenta': { adet: 1, havuz: 5 },
        'siyah':   { adet: 5, havuz: 20 }
    };

    const KURAL_KARTI_AYARI = { adet: 1, havuz: 24 };

    /* =========================================
       SİSTEM KODLARI (Lütfen dikkatli düzenleyin)
       ========================================= */

    let tumKartlar = [];
    let timer;

    function rastgeleSec(max, count) {
        let sonuclar = [];
        while(sonuclar.length < count) {
            let r = Math.floor(Math.random() * max) + 1;
            if(!sonuclar.includes(r)) sonuclar.push(r);
        }
        return sonuclar;
    }

    function oyunHazirla() {
        const grid = document.getElementById('cardGrid');
        grid.innerHTML = '';
        tumKartlar = [];

        // 1. KURAL KARTI[cite: 2]
        rastgeleSec(KURAL_KARTI_AYARI.havuz, KURAL_KARTI_AYARI.adet).forEach(no => {
            renderCard('kural', no, 'kural-border', grid);
        });

        // 2. OYUN KARTLARI (Renklere göre dağıtım)[cite: 2]
        let oyunData = [];
        for (const [renk, ayar] of Object.entries(DAGITIM_AYARLARI)) {
            rastgeleSec(ayar.havuz, ayar.adet).forEach(no => {
                oyunData.push({ renk, no, border: `${renk}-border` });
            });
        }
        
        // Kartları karıştırarak ekrana bas
        oyunData.sort(() => Math.random() - 0.5).forEach(data => {
            renderCard(data.renk, data.no, data.border, grid);
        });
    }

    function renderCard(renk, no, borderClass, target) {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div class="card-inner">
                <div class="face back"><img src="${renk}_arka.webp"></div>
                <div class="face front ${borderClass}"><img src="${renk}_on_${no}.webp"></div>
            </div>`;
        div.onclick = () => div.classList.toggle('flipped');
        target.appendChild(div);
        tumKartlar.push(div);
    }

    // BAŞLAT BUTONU İŞLEMLERİ[cite: 2]
    const sBtn = document.getElementById('startBtn');
    sBtn.onclick = () => {
        sBtn.disabled = true;
        let counter = 0;
        tumKartlar.forEach((c, i) => {
            setTimeout(() => {
                c.classList.add('flipped');
                counter++;
                if(counter === tumKartlar.length) baslatTimer();
            }, i * ACILIS_HIZI);
        });
    };

    function baslatTimer() {
        let kalan = ZAMAN_SANIYE;
        timer = setInterval(() => {
            let m = Math.floor(kalan / 60).toString().padStart(2,'0');
            let s = (kalan % 60).toString().padStart(2,'0');
            sBtn.innerText = `${m}:${s}`;
            kalan--;
            if(kalan < 0) {
                clearInterval(timer);
                alert("Süre bitti!");
                tumKartlar.forEach(c => c.classList.remove('flipped'));
                sBtn.disabled = false;
                sBtn.innerText = "Başlat";
            }
        }, 1000);
    }

    // İNDİRME FONKSİYONU[cite: 1]
    document.getElementById('downloadBtn').onclick = () => {
        const metin = document.getElementById('storyText').value;
        if(!metin.trim()) return alert("Lütfen önce bir şeyler yazın!");
        const blob = new Blob([metin], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "hikayem.txt";
        a.click();
        URL.revokeObjectURL(url);
    };

    window.onload = oyunHazirla;
</script>

</body>
</html>
