<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görünmez Kentler Online</title>
    <link rel="icon" type="image/png" href="POETA_LOGO.jpg">
    <link rel="apple-touch-icon" href="POETA_LOGO.jpg">
    <style>
        :root { --bg: #8b8b83; --cyan: #fffff0; }
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; height: 100vh; margin: 0; overflow: hidden;
        }

        /* MOBİL DÜZEN */
        @media (max-width: 768px) {
            body { display: flex; flex-direction: column; overflow-y: auto; height: auto; }
            .text-area-container { order: 1; width: 100%; height: auto !important; border: none; padding: 15px; }
            .cards-area { order: 2; width: 100%; height: auto !important; overflow: visible !important; padding: 15px; }
            .grid { grid-template-columns: repeat(2, 1fr) !important; }
            textarea { height: 120px; max-height: 300px; }
        }

        .cards-area { flex: 3; padding: 20px; overflow-y: auto; height: 100vh; }
        .text-area-container { flex: 1; display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.3); border-left: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; height: 100vh; }
        .title { color: var(--cyan); font-size: 0.85rem; font-weight: bold; text-transform: uppercase; margin: 10px 0; border-left: 3px solid var(--cyan); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; width: 100%; }

        /* TEXTAREA */
        textarea { 
            width: 100%; min-height: 80px; max-height: 350px; 
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--cyan); padding: 12px; border-radius: 8px; resize: none; outline: none; 
            overflow-y: auto; transition: 0.3s;
        }

        /* BUTON */
        #allOpenBtn {
            background: transparent; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;
            margin-top: 10px; text-transform: uppercase; font-size: 0.8rem; width: 100%; transition: 0.3s;
        }
        #allOpenBtn:hover:not(:disabled) { background: var(--cyan); color: var(--bg); box-shadow: 0 0 10px var(--cyan); }

        /* KARTLAR */
        .card { width: 100%; aspect-ratio: 827 / 1417; cursor: pointer; perspective: 1000px; opacity: 0; transform: translateY(10px); transition: 0.4s; }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; overflow: hidden; }
        .back { border: 2.5px solid; } 
        .front { transform: rotateY(180deg); background: white; }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* RENK BORDERLARI */
        .kural-ozel { border-color: #ffffff; }
        .sari { border-color: #e3f498; }
        .mavi { border-color: #92e8f7; }
        .kirmizi { border-color: #ff929d; }
        .yesil { border-color: #a7eaa3; }
        .magenta { border-color: #f3c5f6; }
        .siyah { border-color: #000000; }
    </style>
</head>
<body>

<div class="cards-area">
    <div class="title">Kural Kartı</div>
    <div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));" id="kuralGrid"></div>
    <div class="title">Oyun Kartları</div>
    <div class="grid" id="oyunGrid"></div>
</div>

<div class="text-area-container">
    <textarea id="autoTextarea" placeholder="Hikayenizi buraya yazın..." oninput="autoResize(this)"></textarea>
    <button id="allOpenBtn">Hepsini Aç</button>
</div>

<script>
    function autoResize(t) { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; }

    // AYARLAR (WebP Formatına Göre Ayarlandı)
    const ZAMANLAYICI_AKTIF = true; 
    const TOPLAM_SANIYE = 1200;      
    const ACILIS_GECIKMESI = 30;    

    const KURAL_AYAR = { dagitilacak: 1, havuz: 24 };
    const OYUN_AYARLARI = {
        'sari':    { dagitilacak: 7, havuz: 40 },
        'mavi':    { dagitilacak: 3, havuz: 15 },
        'kirmizi': { dagitilacak: 3, havuz: 15 },
        'yesil':   { dagitilacak: 1, havuz: 5 },
        'magenta': { dagitilacak: 1, havuz: 5 },
        'siyah':   { dagitilacak: 5, havuz: 20 }
    };
    
    let tumKartlar = [];
    let isAllOpen = false;

    function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    function randomNumbers(max, count) {
        let n = [];
        while(n.length < count) {
            let r = Math.floor(Math.random() * max) + 1;
            if(!n.includes(r)) n.push(r);
        }
        return n;
    }

    // 1. Kural Kartı (.webp olarak ayarlandı)
    randomNumbers(KURAL_AYAR.havuz, KURAL_AYAR.dagitilacak).forEach((no, i) => {
        const c = render({ color: 'kural-ozel', front: `kural_on_${no}.webp`, back: `kural_arka.webp` }, document.getElementById('kuralGrid'), i);
        tumKartlar.push(c);
    });

    // 2. Oyun Kartları (.webp olarak ayarlandı)
    let oyunData = [];
    for (const [renk, ayar] of Object.entries(OYUN_AYARLARI)) {
        randomNumbers(ayar.havuz, ayar.dagitilacak).forEach(no => {
            oyunData.push({ color: renk, front: `${renk}_on_${no}.webp`, back: `${renk}_arka.webp` });
        });
    }
    oyunData.sort(() => Math.random() - 0.5);
    oyunData.forEach((c, i) => {
        const cardEl = render(c, document.getElementById('oyunGrid'), i + KURAL_AYAR.dagitilacak);
        tumKartlar.push(cardEl);
    });

    function render(card, target, delay) {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="card-inner">
            <div class="face back ${card.color}"><img src="${card.back}" loading="lazy"></div>
            <div class="face front"><img src="${card.front}" loading="lazy"></div>
        </div>`;
        div.onclick = () => div.classList.toggle('flipped');
        target.appendChild(div);
        setTimeout(() => div.classList.add('visible'), delay * 12);
        return div;
    }

    const btn = document.getElementById('allOpenBtn');
    btn.onclick = () => {
        if (!isAllOpen) {
            isAllOpen = true; btn.disabled = true; btn.innerText = "Açılıyor...";
            let count = 0;
            tumKartlar.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('flipped');
                    count++;
                    if(count === tumKartlar.length) {
                        if (ZAMANLAYICI_AKTIF) {
                            let timeLeft = TOPLAM_SANIYE;
                            const timer = setInterval(() => {
                                btn.innerText = `Kalan: ${formatTime(timeLeft)}`;
                                timeLeft--;
                                if(timeLeft < 0) { clearInterval(timer); kapatmaIslemi(); }
                            }, 1000);
                        } else { btn.disabled = false; btn.innerText = "Hepsini Kapat"; }
                    }
                }, index * ACILIS_GECIKMESI);
            });
        } else { kapatmaIslemi(); }
    };

    function kapatmaIslemi() {
        tumKartlar.forEach(c => c.classList.remove('flipped'));
        btn.disabled = false; btn.innerText = "Hepsini Aç"; isAllOpen = false;
    }
</script>
</body>
</html>
