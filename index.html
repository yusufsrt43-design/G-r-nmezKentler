<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görünmez Kentler - Sabit Kural Kartlı Sistem</title>
    <style>
        :root { --bg: #0d2323; --box-bg: #e5fcfb; --accent: #7cffae; }
        * { box-sizing: border-box; }
        body { background: var(--bg); font-family: Arial, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; align-items: center;}

        .main-wrapper { display: flex; flex-direction: row; gap: 20px; width: 100%; max-width: 1500px; height: 95vh; }

        /* SOL TARAF: KART SLIDER */
        .left-section { flex: 1.5; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .slider-container { display: flex; align-items: center; width: 100%; gap: 10px; }
        .card-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1;
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px;
        }

        /* KART TASARIMI - 827x1417 Oranı */
        .card { width: 100%; aspect-ratio: 827 / 1417; perspective: 1000px; display: none; }
        .card.active { display: block; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 4px solid #000; overflow: hidden; background: #fff; }
        .front { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: contain; background: #fff; }

        /* NAVİGASYON */
        .nav-btn { background: black; color: white; border: 1px solid var(--accent); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: var(--accent); color: black; }
        .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .dots-container { display: flex; gap: 10px; align-items: center; }
        .dot { width: 10px; height: 10px; background: white; border-radius: 50%; opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .dot.active { opacity: 1; background: var(--accent); transform: scale(1.4); }

        /* SAĞ TARAF: YAZI ALANI */
        .right-section { flex: 1; background: var(--box-bg); border: 4px solid #000; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; }
        .top-bar { display: flex; border-bottom: 4px solid #000; }
        .top-bar button { flex: 1; padding: 20px; font-size: 22px; font-weight: bold; border: none; background: white; cursor: pointer; transition: 0.3s; }
        #downloadBtn { border-left: 4px solid #000; }
        .top-bar button:hover:not(:disabled) { background: var(--accent); }
        textarea { flex: 1; width: 100%; padding: 15px; font-size: 16px; border: none; outline: none; resize: none; background: transparent; line-height: 1.5; }

        /* RENK BORDERLARI[cite: 2] */
        .kural-border { border-color: #ffffff !important; }
        .sari-border { border-color: #e3f498 !important; }
        .mavi-border { border-color: #92e8f7 !important; }
        .kirmizi-border { border-color: #ff929d !important; }
        .yesil-border { border-color: #a7eaa3 !important; }
        .magenta-border { border-color: #f3c5f6 !important; }
        .siyah-border { border-color: #000000 !important; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; height: auto; }
            .left-section, .right-section { width: 100%; }
            .right-section { height: 450px; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="left-section">
        <div class="slider-container">
            <button class="nav-btn" id="prevBtn" onclick="changeGroup(-1)">❮</button>
            <div class="card-grid" id="cardGrid"></div>
            <button class="nav-btn" id="nextBtn" onclick="changeGroup(1)">❯</button>
        </div>
        <div class="dots-container" id="dotsContainer"></div>
    </div>

    <div class="right-section">
        <div class="top-bar">
            <button id="startBtn">Başlat</button>
            <button id="downloadBtn">İndir</button>
        </div>
        <textarea id="storyText" placeholder="Hikayenizi buraya yazın..."></textarea>
    </div>
</div>

<script>
    /* --- AYARLAR[cite: 2] --- */
    const ZAMAN_SANIYE = 1200; 
    const ACILIS_HIZI = 50;   
    const KART_GRUBU = 4;     

    const DAGITIM = {
        'sari':    { adet: 7, havuz: 40 },
        'mavi':    { adet: 3, havuz: 15 },
        'kirmizi': { adet: 3, havuz: 15 },
        'yesil':   { adet: 1, havuz: 5 },
        'magenta': { adet: 1, havuz: 5 },
        'siyah':   { adet: 5, havuz: 20 }
    };
    const KURAL = { adet: 1, havuz: 24 };

    let tumKartlar = [];
    let currentGroupIndex = 0;
    let totalGroups = 0;

    function randomPick(max, count) {
        let n = [];
        while(n.length < count) {
            let r = Math.floor(Math.random() * max) + 1;
            if(!n.includes(r)) n.push(r);
        }
        return n;
    }

    function init() {
        const grid = document.getElementById('cardGrid');
        const dotsContainer = document.getElementById('dotsContainer');
        
        let dataPool = [];
        
        // 1. KURAL KARTINI SEÇ VE EN BAŞA KOY[cite: 2]
        let kuralNo = randomPick(KURAL.havuz, KURAL.adet)[0];
        dataPool.push({t:'kural', n: kuralNo, b:'kural-border'});

        // 2. OYUN KARTLARINI SEÇ[cite: 2]
        let oyunKartlari = [];
        for (const [r, a] of Object.entries(DAGITIM)) {
            randomPick(a.havuz, a.adet).forEach(n => oyunKartlari.push({t:r, n, b:r+'-border'}));
        }
        // Oyun kartlarını kendi içinde karıştır[cite: 2]
        oyunKartlari.sort(() => Math.random() - 0.5);

        // Havuzu birleştir (İlk kart her zaman kural kartı kalır)
        dataPool = dataPool.concat(oyunKartlari);

        totalGroups = Math.ceil(dataPool.length / KART_GRUBU);
        
        dataPool.forEach((data, index) => {
            const groupIndex = Math.floor(index / KART_GRUBU);
            const card = document.createElement('div');
            card.className = `card group-${groupIndex}`;
            card.innerHTML = `
                <div class="card-inner">
                    <div class="face back"><img src="${data.t}_arka.webp"></div>
                    <div class="face front ${data.b}"><img src="${data.t}_on_${data.n}.webp"></div>
                </div>`;
            card.onclick = () => card.classList.toggle('flipped');
            grid.appendChild(card);
            tumKartlar.push(card);
        });

        for(let i=0; i<totalGroups; i++) {
            const dot = document.createElement('div');
            dot.className = `dot ${i===0?'active':''}`;
            dot.onclick = () => showGroup(i);
            dotsContainer.appendChild(dot);
        }
        showGroup(0);
    }

    function showGroup(index) {
        currentGroupIndex = index;
        tumKartlar.forEach((card, i) => {
            card.classList.toggle('active', Math.floor(i / KART_GRUBU) === index);
        });
        document.querySelectorAll('.dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === index);
        });
        document.getElementById('prevBtn').disabled = index === 0;
        document.getElementById('nextBtn').disabled = index === totalGroups - 1;
    }

    function changeGroup(step) {
        let target = currentGroupIndex + step;
        if(target >= 0 && target < totalGroups) showGroup(target);
    }

    // BAŞLAT[cite: 2]
    document.getElementById('startBtn').onclick = function() {
        this.disabled = true;
        this.innerText = "Yükleniyor...";
        let c = 0;
        tumKartlar.forEach((card, i) => {
            setTimeout(() => {
                card.classList.add('flipped');
                c++;
                if(c === tumKartlar.length) startTimer();
            }, i * ACILIS_HIZI);
        });
    };

    function startTimer() {
        let t = ZAMAN_SANIYE;
        const btn = document.getElementById('startBtn');
        const interval = setInterval(() => {
            let min = Math.floor(t/60).toString().padStart(2,'0');
            let sec = (t%60).toString().padStart(2,'0');
            btn.innerText = `${min}:${sec}`;
            t--;
            if(t < 0) { clearInterval(interval); alert("Süre bitti!"); }
        }, 1000);
    }

    // İNDİR[cite: 1]
    document.getElementById('downloadBtn').onclick = () => {
        const val = document.getElementById('storyText').value;
        if(!val.trim()) return alert("Lütfen önce bir şeyler yazın!");
        const blob = new Blob([val], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "hikayem.txt";
        a.click();
    };

    window.onload = init;
</script>
</body>
</html>
