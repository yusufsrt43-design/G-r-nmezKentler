<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görünmez Kentler v5 - Odaklanmış Kural Kartı</title>
    <style>
        :root { --bg: #0d2323; --box-bg: #e5fcfb; --accent: #7cffae; }
        * { box-sizing: border-box; }
        body { background: var(--bg); font-family: Arial, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; align-items: center; }

        .main-wrapper { display: flex; flex-direction: row; gap: 20px; width: 100%; max-width: 1400px; height: 92vh; }

        /* SOL TARAF: KART SLIDER */
        .left-section { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .slider-container { display: flex; align-items: center; width: 100%; gap: 10px; justify-content: center; }
        
        .card-grid { 
            display: grid; grid-template-columns: repeat(2, minmax(100px, 150px)); gap: 12px;
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; min-height: 450px; align-items: center; justify-content: center;
        }

        /* KART TASARIMI - 827x1417 Oranı */
        .card { width: 100%; aspect-ratio: 827 / 1417; perspective: 1000px; display: none; margin: auto; }
        .card.active { display: block; }
        
        /* KURAL KARTI ÖZEL (BÜYÜK VE ORTALI) */
        .card.is-kural { 
            grid-column: 1 / span 2; /* İki sütunu kapla */
            max-width: 260px;       /* Diğerlerinden daha geniş */
            transform: scale(1.1);   /* Hafif büyüme efekti */
        }

        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 4px solid #000; overflow: hidden; background: #fff; }
        .front { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: contain; background: #fff; }

        /* NAVİGASYON */
        .nav-btn { background: black; color: white; border: 1px solid var(--accent); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: var(--accent); color: black; }
        .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .dots-container { display: flex; gap: 10px; align-items: center; }
        .dot { width: 10px; height: 10px; background: white; border-radius: 50%; opacity: 0.3; transition: 0.3s; cursor: pointer; }
        .dot.active { opacity: 1; background: var(--accent); transform: scale(1.4); }

        /* SAĞ TARAF: YAZI ALANI */
        .right-section { flex: 1; background: var(--box-bg); border: 5px solid #000; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; }
        .top-bar { display: flex; border-bottom: 4px solid #000; }
        .top-bar button { flex: 1; padding: 20px; font-size: 24px; font-weight: bold; border: none; background: white; cursor: pointer; transition: 0.3s; }
        #downloadBtn { border-left: 4px solid #000; }
        .top-bar button:hover:not(:disabled) { background: var(--accent); }
        textarea { flex: 1; width: 100%; padding: 20px; font-size: 18px; border: none; outline: none; resize: none; background: transparent; line-height: 1.5; }

        /* RENK BORDERLARI[cite: 2] */
        .kural-border { border-color: #ffffff !important; }
        .sari-border { border-color: #e3f498 !important; }
        .mavi-border { border-color: #92e8f7 !important; }
        .kirmizi-border { border-color: #ff929d !important; }
        .yesil-border { border-color: #a7eaa3 !important; }
        .magenta-border { border-color: #f3c5f6 !important; }
        .siyah-border { border-color: #000000 !important; }

        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; height: auto; }
            .right-section { height: 400px; width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="left-section">
        <div class="slider-container">
            <button class="nav-btn" id="prevBtn" onclick="changeGroup(-1)">❮</button>
            <div class="card-grid" id="cardGrid"></div>
            <button class="nav-btn" id="nextBtn" onclick="changeGroup(1)">❯</button>
        </div>
        <div class="dots-container" id="dotsContainer"></div>
    </div>

    <div class="right-section">
        <div class="top-bar">
            <button id="startBtn">Başlat</button>
            <button id="downloadBtn">İndir</button>
        </div>
        <textarea id="storyText" placeholder="Hikayenizi buraya yazın..."></textarea>
    </div>
</div>

<script>
    /* --- AYARLAR[cite: 2] --- */
    const ZAMAN_SANIYE = 1200; 
    const ACILIS_HIZI = 50;   
    const OYUN_KART_GRUBU = 4; // Oyun kartları her sekmede 4 tane olsun

    const DAGITIM = {
        'sari':    { adet: 7, havuz: 40 },
        'mavi':    { adet: 3, havuz: 15 },
        'kirmizi': { adet: 3, havuz: 15 },
        'yesil':   { adet: 1, havuz: 5 },
        'magenta': { adet: 1, havuz: 5 },
        'siyah':   { adet: 5, havuz: 20 }
    };
    const KURAL_HAVUZ = 24;

    let tumKartlar = [];
    let currentGroupIndex = 0;
    let totalGroups = 0;

    function randomPick(max, count) {
        let n = [];
        while(n.length < count) {
            let r = Math.floor(Math.random() * max) + 1;
            if(!n.includes(r)) n.push(r);
        }
        return n;
    }

    function init() {
        const grid = document.getElementById('cardGrid');
        const dotsContainer = document.getElementById('dotsContainer');
        grid.innerHTML = '';
        dotsContainer.innerHTML = '';
        tumKartlar = [];

        // 1. Kural Kartını Oluştur (Grup 0 - Büyük ve Ortalı)[cite: 2]
        let kuralNo = randomPick(KURAL_HAVUZ, 1)[0];
        addCardToDOM('kural', kuralNo, 'kural-border', 0, grid, true);

        // 2. Oyun Kartlarını Hazırla[cite: 2]
        let oyunKartlari = [];
        for (const [r, a] of Object.entries(DAGITIM)) {
            randomPick(a.havuz, a.adet).forEach(n => oyunKartlari.push({t:r, n, b:r+'-border'}));
        }
        oyunKartlari.sort(() => Math.random() - 0.5);

        // 3. Oyun Kartlarını 4'erli Gruplara Ayır (Grup 1'den başlar)[cite: 2]
        oyunKartlari.forEach((data, index) => {
            const groupIndex = Math.floor(index / OYUN_KART_GRUBU) + 1;
            addCardToDOM(data.t, data.n, data.b, groupIndex, grid, false);
        });

        // 4. Navigasyon Noktaları[cite: 1]
        totalGroups = Math.max(...tumKartlar.map(c => parseInt(c.dataset.group))) + 1;
        for(let i=0; i<totalGroups; i++) {
            const dot = document.createElement('div');
            dot.className = `dot ${i===0?'active':''}`;
            dot.onclick = () => showGroup(i);
            dotsContainer.appendChild(dot);
        }
        showGroup(0);
    }

    function addCardToDOM(type, no, border, group, container, isKural) {
        const card = document.createElement('div');
        card.className = `card ${isKural ? 'is-kural' : ''}`;
        card.dataset.group = group;
        card.innerHTML = `
            <div class="card-inner">
                <div class="face back"><img src="${type}_arka.webp"></div>
                <div class="face front ${border}"><img src="${type}_on_${no}.webp"></div>
            </div>`;
        card.onclick = () => card.classList.toggle('flipped');
        container.appendChild(card);
        tumKartlar.push(card);
    }

    function showGroup(index) {
        currentGroupIndex = index;
        tumKartlar.forEach(card => {
            card.classList.toggle('active', parseInt(card.dataset.group) === index);
        });
        document.querySelectorAll('.dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === index);
        });
        document.getElementById('prevBtn').disabled = index === 0;
        document.getElementById('nextBtn').disabled = index === totalGroups - 1;
    }

    function changeGroup(step) {
        let target = currentGroupIndex + step;
        if(target >= 0 && target < totalGroups) showGroup(target);
    }

    // BAŞLAT BUTONU[cite: 2]
    document.getElementById('startBtn').onclick = function() {
        this.disabled = true;
        this.innerText = "Açılıyor...";
        let c = 0;
        tumKartlar.forEach((card, i) => {
            setTimeout(() => {
                card.classList.add('flipped');
                c++;
                if(c === tumKartlar.length) startTimer();
            }, i * ACILIS_HIZI);
        });
    };

    function startTimer() {
        let t = ZAMAN_SANIYE;
        const btn = document.getElementById('startBtn');
        const interval = setInterval(() => {
            let min = Math.floor(t/60).toString().padStart(2,'0');
            let sec = (t%60).toString().padStart(2,'0');
            btn.innerText = `${min}:${sec}`;
            t--;
            if(t < 0) { clearInterval(interval); alert("Süre bitti!"); }
        }, 1000);
    }

    // İNDİR BUTONU[cite: 1]
    document.getElementById('downloadBtn').onclick = () => {
        const val = document.getElementById('storyText').value;
        if(!val.trim()) return alert("Lütfen önce bir şeyler yazın!");[cite: 1]
        const blob = new Blob([val], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "hikayem.txt";[cite: 1]
        a.click();
    };

    window.onload = init;
</script>
</body>
</html>
